<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poddle — More customers. Zero ad spend.</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <div class="nav-inner">
      <a href="#" class="nav-logo">
        <img src="poddle_logo.webp" alt="Poddle">
      </a>
      <div class="nav-actions" id="navActions">
        <a href="#" class="nav-link">Book a Call</a>
        <a href="#" class="nav-btn-primary">Join Waitlist</a>
      </div>
    </div>
  </nav>

  <!-- Hero text overlay (fixed, covers top ~70vh with white bg) -->
  <section class="slide-one" id="slideOne">
    <div class="hero" id="hero">
      <div class="hero-content" id="heroContent">
        <h1 class="hero-title">
          <span class="cascade-text" data-cascade-order="0">Turn Your Regulars</span>
          <span class="cascade-text" data-cascade-order="1">Into a Word-of-Mouth</span>
          <span class="cascade-text" data-cascade-order="2">Machine.</span>
        </h1>
        <p class="hero-subtitle cascade-text" data-cascade-order="3">The poddle automatically turns your loyal customers into referrers, reviewers, and promoters — so new customers keep arriving without spending on ads.</p>
        <div class="mask-wrap" data-mask-order="4">
          <div class="hero-ctas mask-inner">
            <a href="#" class="btn-waitlist">Get Early Access</a>
          </div>
        </div>
        <p class="hero-disclaimer cascade-text" data-cascade-order="5">No payment. No obligation. Set up in 10 minutes.</p>
      </div>
    </div>
  </section>

  <!-- Single image — starts at 85% width, top ~30% visible below hero on load -->
  <div class="hero-image-wrapper" id="heroImageWrapper">
    <div class="hero-image-container" id="heroImageContainer">
      <img src="hero1.jpg" alt="Hero" class="hero-full-img" id="heroFullImg">
    </div>
  </div>


  <!-- Liquid glass turbulence filter for hero buttons -->
  <svg style="display:none" aria-hidden="true">
    <defs>
      <filter id="container-glass" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
        <feTurbulence type="fractalNoise" baseFrequency="0.05 0.05" numOctaves="1" seed="1" result="turbulence"/>
        <feGaussianBlur in="turbulence" stdDeviation="2" result="blurredNoise"/>
        <feDisplacementMap in="SourceGraphic" in2="blurredNoise" scale="70" xChannelSelector="R" yChannelSelector="B" result="displaced"/>
        <feGaussianBlur in="displaced" stdDeviation="4" result="finalBlur"/>
        <feComposite in="finalBlur" in2="finalBlur" operator="over"/>
      </filter>
    </defs>
  </svg>
    <script src="script.js"></script>
</body>
</html>
